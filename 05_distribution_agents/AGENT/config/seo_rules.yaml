# SEO Rules — Правила для создания контента
# Используется агентом producer_report при генерации SEO.pdf
# Редактируй этот файл чтобы настраивать стиль и требования

titles:
  count: 5                          # сколько вариантов заголовков генерировать
  max_words: 10                     # максимум слов в заголовке
  min_words: 4
  language: "ru"                    # ru | en | both
  style: |
    - Заголовок должен вызывать интерес с первых слов
    - Используй цифры, конкретику, провокацию или вопрос
    - Без воды: "Как я...", "Почему я...", "Что будет если...", "X причин..."
    - Запрещено: "революционный", "инновационный", "полное руководство", "глубокое погружение"
    - Заголовок должен отражать личный опыт автора, не абстрактные советы
    - Максимум 60 символов (для YouTube)
  banned_words:
    - "революционный"
    - "инновационный"
    - "лайфхак"
    - "топ-10"
    - "полное руководство"
    - "глубокое погружение"
    - "comprehensive"
    - "revolutionary"

description:
  max_chars: 2500
  include_timecodes: true           # добавить таймкоды в описание
  include_cta: true                 # добавить призыв к действию
  include_links: true               # добавить ссылки (подставляются из about_me)
  language: "ru"
  structure: |
    1. Первые 2-3 строки — самое важное (отображается без раскрытия)
    2. Краткое описание о чём видео (2-4 предложения)
    3. Что зритель узнает / получит
    4. Таймкоды глав
    5. Ссылки и контакты
    6. Хэштеги в конце (3-5 штук)
  cta_template: |
    👍 Ставь лайк если было полезно
    🔔 Подпишись чтобы не пропустить следующее
    💬 Напиши в комментарии что думаешь

tags:
  count: 15                         # количество тегов
  language: "ru"                    # ru | en | both
  include_channel_tags: true        # добавить фирменные теги канала
  channel_tags: []                  # заполни свои постоянные теги

thumbnail:
  style_description: |
    - Тёмный кинематографичный фон, глубокие тёмно-синие или фиолетовые тона
    - Яркий акцент: электрический синий или неоновый
    - Крупный план лица автора на одной стороне
    - Жирный белый текст с лёгким свечением
    - Высокий контраст — читаемо при ширине 200px
    - Не более 6 слов текста на превью
    - YouTube-стиль: выразительно, смело, кликабельно
  format: "1280x720"
  text_max_words: 6

shorts_tz:
  count: 3                          # сколько шортс предложить
  duration_seconds: 60              # целевая длина шортс
  style: |
    - Первые 3 секунды: сильный хук — вопрос, провокация или факт
    - Середина: одна конкретная мысль / совет / история
    - Финал: вывод + призыв подписаться
    - Вертикальный формат 9:16
    - Субтитры обязательны
    - Без вводных слов типа "всем привет"
